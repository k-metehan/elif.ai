<!DOCTYPE html>

<html lang="tr"><head>

<style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f7f4ef; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .iznik-glow { box-shadow: 0px 0px 30px rgba(129, 212, 216, 0.4); }
        .ambient-shadow { box-shadow: 0px 24px 48px -12px rgba(26, 42, 58, 0.08); }
        .bosphorus-gradient { background: linear-gradient(135deg, #00595c 0%, #0d7377 100%); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col overflow-hidden">
<!-- TopAppBar -->
<header class="bg-[#f7f4ef]/85 dark:bg-[#1a2a3a]/85 backdrop-blur-md fixed top-0 w-full z-50 flex justify-between items-center px-8 py-4">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center overflow-hidden">
<img alt="Elif assistant logo" class="w-full h-full object-cover" data-alt="Close up portrait of a friendly professional woman with a warm smile, soft natural morning light" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBxfaYFwCTg9Ro759MCnhEp87r9Rijbw4B5TjMpnLQfTxpDH3vAgcMlS4cwsK8e55G5lv17CatQ8o7T7pGWMqAM_tzJVOQqkKOETAbimxzcZnS9-KfxPNe-4YWJ8uaNddkLFEbRsSiYCGR1Cy_-cICVt7NluxqnYJeWBQonrhzfYrT6--juKhNkNO5MWXcGBjdMUjWwt4JK8vB9fGBqNxg_b6veKV9eQrg7aJB2KdanoRAZ_QaNTacqA2z9dnIUCy1c95QNZqD-YX4"/>
</div>
<span class="text-[#1a2a3a] dark:text-[#f7f4ef] font-extrabold text-2xl tracking-tight">Elif</span>
</div>
<button class="text-[#506072] hover:opacity-80 transition-opacity duration-300">
<span class="material-symbols-outlined text-2xl">settings</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 flex flex-col px-6 pt-32 pb-40 max-w-2xl mx-auto w-full space-y-8">
<!-- Greeting Section -->
<section class="space-y-2">
<h1 class="text-[3.5rem] leading-tight font-extrabold text-on-secondary-fixed tracking-tighter">
                Günaydın
            </h1>
<p class="text-secondary body-lg leading-relaxed">Size nasıl yardımcı olabilirim?</p>
</section>
<!-- Chat Conversation Area -->
<div class="space-y-6 flex flex-col">
<!-- User Intent (Ghost Bubble) -->
<div class="self-end max-w-[85%] bg-surface-container-highest text-on-secondary-fixed-variant px-6 py-4 rounded-[24px_24px_6px_24px] ambient-shadow">
<p class="body-lg">Hava nasıl ve bugün neler var?</p>
</div>
<!-- Assistant Response -->
<div class="self-start max-w-[85%] bg-surface-container-lowest text-on-secondary-fixed px-6 py-5 rounded-[24px_24px_24px_6px] ambient-shadow">
<p class="body-lg leading-[1.6]">Günaydın! Bugün Bahçeşehir'de hava güneşli. Nöbetçi eczaneleri öğrenmek ister misiniz?</p>
</div>
<!-- Suggestion Bento Grid -->
<div class="grid grid-cols-2 gap-4 pt-4">
<div class="bg-surface-container-lowest p-6 rounded-lg ambient-shadow flex flex-col justify-between hover:bg-surface-container-low transition-all duration-300 cursor-pointer group">
<span class="material-symbols-outlined text-primary text-3xl mb-4">local_pharmacy</span>
<span class="label-md font-bold text-on-secondary-fixed tracking-wide">ECZANELER</span>
</div>
<div class="bg-surface-container-lowest p-6 rounded-lg ambient-shadow flex flex-col justify-between hover:bg-surface-container-low transition-all duration-300 cursor-pointer group">
<span class="material-symbols-outlined text-primary text-3xl mb-4">wb_sunny</span>
<span class="label-md font-bold text-on-secondary-fixed tracking-wide">DETAYLI HAVA</span>
</div>
</div>
</div>
</main>
<!-- Interactive Voice Layer -->
<div class="fixed bottom-0 left-0 right-0 z-40 px-6 pb-12 flex flex-col items-center pointer-events-none">
<!-- Visualizer or Label text -->
<div class="mb-6 pointer-events-auto">
<p class="text-secondary font-medium tracking-wide text-sm opacity-60">Sormak için basılı tut</p>
</div>
<!-- Signature Pill Microphone -->
<div class="relative pointer-events-auto">
<button class="bosphorus-gradient w-24 h-24 rounded-full flex items-center justify-center iznik-glow active:scale-90 transition-all duration-300 cubic-bezier(0.4, 0, 0.2, 1)">
<span class="material-symbols-outlined text-white text-4xl" style="font-variation-settings: 'FILL' 1;">mic</span>
</button>
<!-- Decorative Glow Rings (Visual Depth) -->
<div class="absolute inset-0 rounded-full border-2 border-primary-fixed-dim/20 -m-3 animate-pulse"></div>
</div>
</div>
<!-- BottomNavBar Shell -->
<nav class="fixed bottom-0 w-full z-50 flex justify-around items-center px-6 pb-8 bg-[#ffffff] dark:bg-[#0c1d2c] rounded-t-[2rem] shadow-[0px_-12px_24px_-12px_rgba(26,42,58,0.08)] pointer-events-auto">
<a class="flex flex-col items-center justify-center text-[#506072] dark:text-[#bec9c9] p-4 hover:text-[#0d7377] transition-all duration-300" href="#">
<span class="material-symbols-outlined text-2xl">history</span>
</a>
<!-- Central Slot reserved for the Floating Mic above it -->
<div class="w-20"></div>
<a class="flex flex-col items-center justify-center text-[#506072] dark:text-[#bec9c9] p-4 hover:text-[#0d7377] transition-all duration-300" href="#">
<span class="material-symbols-outlined text-2xl">account_circle</span>
</a>
</nav>
<!-- Decorative Background Accent -->
<div class="fixed top-0 right-0 w-1/2 h-1/2 bg-primary-fixed/5 rounded-full blur-[120px] -z-10 translate-x-1/4 -translate-y-1/4"></div>
<div class="fixed bottom-0 left-0 w-1/3 h-1/3 bg-secondary-fixed/5 rounded-full blur-[100px] -z-10 -translate-x-1/4 translate-y-1/4"></div>
</body></html>
