<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CityConcierge - Çevrimdışı</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            background: #f7f4ef;
            color: #1a2a3a;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 24px;
            text-align: center;
        }
        h1 { font-size: 1.5rem; margin-bottom: 16px; color: #1a2a3a; }
        p { color: #506072; font-size: 0.95rem; line-height: 1.6; }
        .emoji { font-size: 3rem; margin-bottom: 16px; }
        .accent { color: #0d7377; }
    </style>
</head>
<body>
    <div>
        <div class="emoji">📡</div>
        <h1>İnternet bağlantısı yok</h1>
        <p>Elif'e soru sormak için internet bağlantısı gerekli.<br>Bağlantınızı kontrol edip tekrar deneyin.</p>
    </div>
</body>
</html>
