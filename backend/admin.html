<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Başakşehir Sesli Asistan — Yönetim Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        :root {
            --bg-primary: #f7f4ef;
            --bg-secondary: #ffffff;
            --text-primary: #1a2a3a;
            --text-secondary: #506072;
            --accent: #004B93;
            --accent-hover: #003a75;
            --shadow-sm: 0px 24px 48px -12px rgba(26, 42, 58, 0.05);
            --shadow-md: 0px 24px 48px -12px rgba(26, 42, 58, 0.08);
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --radius-xl: 32px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        /* Blue top stripe */
        .top-stripe {
            height: 4px;
            background: var(--accent);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header */
        header {
            margin-bottom: 32px;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .header-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background: #0d7377;
            border-radius: 50%;
            animation: livePulse 2s infinite;
        }

        @keyframes livePulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .header-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Stat Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-sm);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-card.emergency .stat-value {
            color: #ba1a1a;
        }

        /* Charts Section */
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 24px;
        }

        .chart-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-sm);
        }

        .chart-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .chart-container {
            position: relative;
            height: 250px;
        }

        /* Recent Queries */
        .recent-section {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: 20px;
            box-shadow: var(--shadow-sm);
        }

        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 16px;
        }

        .query-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .query-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--bg-primary);
            border-radius: var(--radius-md);
            font-size: 0.9rem;
        }

        .query-time {
            color: var(--text-secondary);
            font-size: 0.8rem;
            min-width: 50px;
        }

        .query-topic {
            padding: 4px 10px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            min-width: 100px;
            text-align: center;
        }

        .topic-eczane { background: rgba(13,115,119,0.1); color: #0d7377; }
        .topic-acil_durum { background: rgba(186,26,26,0.08); color: #ba1a1a; }
        .topic-etkinlik { background: rgba(80,96,114,0.1); color: #506072; }
        .topic-su_kesintisi { background: rgba(0,89,92,0.08); color: #00595c; }
        .topic-yol_kapanisi { background: rgba(151,87,49,0.1); color: #975731; }
        .topic-genel { background: rgba(80,96,114,0.08); color: #506072; }
        .topic-unclassified { background: rgba(80,96,114,0.08); color: #506072; }

        .query-text {
            flex: 1;
            color: var(--text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .emergency-icon {
            color: #dc2626;
            font-size: 1rem;
        }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: var(--radius-sm);
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-text {
            height: 1rem;
            margin-bottom: 0.5rem;
        }

        .skeleton-title {
            height: 1.5rem;
            width: 60%;
            margin-bottom: 1rem;
        }

        .skeleton-card {
            height: 100px;
        }

        /* Footer */
        footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #e2e8f0;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 16px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .stat-value {
                font-size: 1.5rem;
            }

            .query-item {
                flex-wrap: wrap;
            }

            .query-topic {
                order: 3;
            }

            .query-text {
                width: 100%;
                order: 2;
                margin-top: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="top-stripe"></div>
    
    <div class="container">
        <header>
            <div class="header-top">
                <h1 class="header-title">Başakşehir Belediyesi</h1>
                <div class="live-indicator">
                    <div class="live-dot"></div>
                    <span>Canlı</span>
                </div>
            </div>
            <p class="header-subtitle">Sesli Asistan — Yönetim Paneli</p>
        </header>

        <!-- Stats Grid -->
        <div class="stats-grid" id="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Toplam Sorgu</div>
                <div class="stat-value skeleton skeleton-card" id="total-queries">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Bugün</div>
                <div class="stat-value skeleton skeleton-card" id="today-queries">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Oturum Sayısı</div>
                <div class="stat-value skeleton skeleton-card" id="unique-sessions">—</div>
            </div>
            <div class="stat-card emergency">
                <div class="stat-label">Acil Durum</div>
                <div class="stat-value skeleton skeleton-card" id="emergency-count">—</div>
            </div>
        </div>

        <!-- Charts -->
        <div class="charts-grid">
            <div class="chart-card">
                <h3 class="chart-title">Konu Dağılımı</h3>
                <div class="chart-container">
                    <canvas id="topicChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3 class="chart-title">Günlük Sorgular (Son 7 Gün)</h3>
                <div class="chart-container">
                    <canvas id="dailyChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Recent Queries -->
        <div class="recent-section">
            <h3 class="section-title">Son Sorgular</h3>
            <div class="query-list" id="query-list">
                <div class="query-item skeleton">
                    <div class="skeleton-text" style="width: 100%"></div>
                </div>
                <div class="query-item skeleton">
                    <div class="skeleton-text" style="width: 100%"></div>
                </div>
                <div class="query-item skeleton">
                    <div class="skeleton-text" style="width: 100%"></div>
                </div>
            </div>
        </div>

        <footer>
            cityconcierge.io — v0.1.0 demo
        </footer>
    </div>

    <script>
        // Topic colors for charts
        const topicColors = {
            eczane: '#0d7377',
            acil_durum: '#ba1a1a',
            etkinlik: '#506072',
            su_kesintisi: '#00595c',
            yol_kapanisi: '#975731',
        };

        let topicChart, dailyChart;

        async function fetchStats() {
            try {
                const response = await fetch('/api/admin/stats', { credentials: 'include' });
                if (!response.ok) throw new Error('Failed to fetch stats');
                return await response.json();
            } catch (err) {
                console.error('Error fetching stats:', err);
                return null;
            }
        }

        function updateStatCards(stats) {
            document.getElementById('total-queries').textContent = stats.total_queries.toLocaleString();
            document.getElementById('today-queries').textContent = stats.today_queries.toLocaleString();
            document.getElementById('unique-sessions').textContent = stats.unique_sessions.toLocaleString();
            document.getElementById('emergency-count').textContent = stats.emergency_count.toLocaleString();
            
            // Remove skeleton classes
            document.querySelectorAll('.stat-value').forEach(el => {
                el.classList.remove('skeleton', 'skeleton-card');
            });
        }

        function updateTopicChart(topicBreakdown) {
            const ctx = document.getElementById('topicChart').getContext('2d');
            
            const labels = Object.keys(topicBreakdown).map(t => {
                const labels = {
                    eczane: 'Eczane',
                    acil_durum: 'Acil Durum',
                    etkinlik: 'Etkinlik',
                    su_kesintisi: 'Su Kesintisi',
                    yol_kapanisi: 'Yol Kapanışı',
                    genel: 'Genel',
                    unclassified: 'Sınıflandırılmamış'
                };
                return labels[t] || t;
            });
            
            const data = Object.values(topicBreakdown);
            const colors = Object.keys(topicBreakdown).map(t => topicColors[t] || '#8b949e');

            if (topicChart) topicChart.destroy();

            topicChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: colors,
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                font: { family: 'Plus Jakarta Sans', size: 12 },
                                padding: 16
                            }
                        }
                    }
                }
            });
        }

        function updateDailyChart(dailyData) {
            const ctx = document.getElementById('dailyChart').getContext('2d');
            
            // Reverse to show oldest first
            const sorted = [...dailyData].reverse();
            const labels = sorted.map(d => {
                const date = new Date(d.day);
                return date.toLocaleDateString('tr-TR', { weekday: 'short', day: 'numeric' });
            });
            const data = sorted.map(d => d.count);

            if (dailyChart) dailyChart.destroy();

            dailyChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Sorgu Sayısı',
                        data: data,
                        backgroundColor: '#004B93',
                        borderRadius: 6,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { stepSize: 1 }
                        },
                        x: {
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        function updateRecentQueries(queries) {
            const container = document.getElementById('query-list');
            container.innerHTML = '';

            queries.forEach(q => {
                const item = document.createElement('div');
                item.className = 'query-item';
                
                const time = new Date(q.timestamp).toLocaleTimeString('tr-TR', { 
                    hour: '2-digit', 
                    minute: '2-digit' 
                });
                
                const topicClass = `topic-${q.topic}`;
                const topicLabel = {
                    eczane: 'Eczane',
                    acil_durum: 'Acil',
                    etkinlik: 'Etkinlik',
                    su_kesintisi: 'Su',
                    yol_kapanisi: 'Yol',
                    genel: 'Genel',
                    unclassified: 'Diğer'
                }[q.topic] || q.topic;

                // Create elements safely (avoid XSS)
                const timeSpan = document.createElement('span');
                timeSpan.className = 'query-time';
                timeSpan.textContent = time;

                const topicSpan = document.createElement('span');
                topicSpan.className = `query-topic ${topicClass}`;
                topicSpan.textContent = topicLabel;

                const queryText = document.createElement('span');
                queryText.className = 'query-text';
                queryText.textContent = q.user_query;  // textContent = safe

                item.appendChild(timeSpan);
                item.appendChild(topicSpan);
                item.appendChild(queryText);

                if (q.is_emergency) {
                    const emergencySpan = document.createElement('span');
                    emergencySpan.className = 'emergency-icon';
                    emergencySpan.textContent = '⚠️';
                    item.appendChild(emergencySpan);
                }
                
                container.appendChild(item);
            });
        }

        async function loadDashboard() {
            const stats = await fetchStats();
            if (!stats) return;

            updateStatCards(stats);
            updateTopicChart(stats.topic_breakdown);
            updateDailyChart(stats.daily_queries);
            updateRecentQueries(stats.recent_queries);
        }

        // Initial load
        loadDashboard();

        // Auto-refresh every 30 seconds
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
