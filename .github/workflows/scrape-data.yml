name: Scrape Data

on:
  schedule:
    - cron: '0 */2 * * *'   # Weather: every 2 hours
    - cron: '*/15 * * * *'  # Earthquakes: every 15 minutes
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape-data
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install scraper dependencies
        run: pip install requests

      - name: Run scheduled scraper
        working-directory: backend
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual run: updating weather and earthquakes"
            python scrape_weather.py
            python scrape_earthquakes.py
          elif [ "${{ github.event.schedule }}" = "0 */2 * * *" ]; then
            echo "Scheduled run: updating weather"
            python scrape_weather.py
          elif [ "${{ github.event.schedule }}" = "*/15 * * * *" ]; then
            echo "Scheduled run: updating earthquakes"
            python scrape_earthquakes.py
          else
            echo "No scraper configured for schedule '${{ github.event.schedule }}'"
            exit 1
          fi

      - name: Check what changed
        run: |
          git status --short
          git diff --stat

      - name: Commit and push if data changed
        run: |
          git config user.name "Data Bot"
          git config user.email "bot@cityconcierge.io"
          git add backend/data/weather.json backend/data/earthquakes.json
          if git diff --staged --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "chore: auto-update data $(date -u +%Y-%m-%dT%H:%M)"
            git push
          fi
