name: Refresh Fallback Data

# Weather and earthquakes are now fetched LIVE at runtime.
# This workflow only updates the static fallback JSON files
# so cold starts have recent data. It's NOT critical path.

on:
  schedule:
    - cron: '0 6 * * *'   # Once daily at 06:00 UTC (09:00 Istanbul)
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Refresh weather fallback
        working-directory: backend
        run: python scrape_weather.py || echo "Weather scrape failed (non-critical)"

      - name: Refresh earthquakes fallback
        working-directory: backend
        run: python scrape_earthquakes.py || echo "Earthquake scrape failed (non-critical)"

      - name: Refresh pharmacies
        working-directory: backend
        run: python scrape_nobetci.py || echo "Pharmacy scrape failed (non-critical)"

      - name: Commit if data changed
        run: |
          git config user.name "Data Bot"
          git config user.email "bot@cityconcierge.io"
          git add backend/data/*.json
          if git diff --staged --quiet; then
            echo "No data changes"
          else
            git commit -m "chore: daily data refresh $(date -u +%Y-%m-%d)"
            git push
          fi
