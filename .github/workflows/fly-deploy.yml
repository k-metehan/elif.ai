name: Fly Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: fly-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install flyctl
        run: curl -L https://fly.io/install.sh | sh

      - name: Add flyctl to PATH
        run: echo "$HOME/.fly/bin" >> "$GITHUB_PATH"

      - name: Verify flyctl and app config
        run: |
          flyctl version
          echo "Configured Fly app:"
          sed -n "1,40p" fly.toml

      - name: Deploy to Fly
        run: flyctl deploy --remote-only --verbose
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
